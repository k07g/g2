name: バグ報告
description: バグを報告する
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 発生している問題
      description: 何が起きているか説明してください。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境
      placeholder: |
        - OS:
        - Go:
        - Docker:
